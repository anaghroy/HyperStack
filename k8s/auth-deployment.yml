apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  labels:
    name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - image: auth
          imagePullPolicy: IfNotPresent
          name: auth-container
          resources:
            requests:
              cpu: "250m"
              memory: "128M"
            limits:
              cpu: "500m"
              memory: "256M"
          livenessProbe:
            httpGet:
              path: /_status/healthz
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /_status/healthz
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10
          env:
            - name: AUTH_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AUTH_MONGO_URI

            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_URI

            - name: RABBITMQ_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_PORT

            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GOOGLE_CLIENT_ID

            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GOOGLE_CLIENT_SECRET

            - name: GOOGLE_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GOOGLE_CALLBACK_URL

            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GITHUB_CLIENT_ID

            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GITHUB_CLIENT_SECRET

            - name: GITHUB_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GITHUB_CALLBACK_URL

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET

            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: FRONTEND_URL

            - name: IMAGEKIT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: IMAGEKIT_PUBLIC_KEY

            - name: IMAGEKIT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: IMAGEKIT_PRIVATE_KEY

            - name: IMAGEKIT_URL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: IMAGEKIT_URL_ENDPOINT

            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: REDIS_URL
          ports:
            - containerPort: 3000
              name: auth-http
