apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-deployment
  labels:
    name: sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      serviceAccountName: resource-manager
      containers:
        - name: main-sandbox-container
          image: sandbox:latest
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: "500m"
              memory: "400Mi"
            requests:
              cpu: "250m"
              memory: "200Mi"
          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: REDIS_URL
            
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET

            - name: SANDBOX_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SANDBOX_MONGO_URI
          ports:
            - containerPort: 3000
              name: main-sandbox
