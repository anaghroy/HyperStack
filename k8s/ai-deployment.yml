apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
  labels:
    name: ai-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-server
  template:
    metadata:
      labels:
        app: ai-server
    spec:
      containers:
        - image: ai-orchestration
          name: ai-server
          env:
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: NVIDIA_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: GROQ_API_KEY
            - name: COHERE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: COHERE_API_KEY
            - name: AI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: AI_MODEL
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/status/readyz
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10

          ports:
            - containerPort: 3000
              name: ai-server-port
