apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deployment
  labels:
    name: notification-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - image: notification
          name: notification-server
          resources:
            requests:
              cpu: "150m"
              memory: "100Mi"
            limits:
              cpu: "300m"
              memory: "200Mi"
          livenessProbe:
            httpGet:
              path: /_status/healthz
              port: 4000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /_status/healthz
              port: 4000
            initialDelaySeconds: 30
            timeoutSeconds: 10
          env:
            - name: BREVO_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: BREVO_SENDER_EMAIL

            - name: BREVO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: BREVO_API_KEY

            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_URI

            - name: AUTH_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AUTH_MONGO_URI

          ports:
            - containerPort: 4000
              name: notifi-http
